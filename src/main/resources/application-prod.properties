# Prod (e.g., Render PostgreSQL)
spring.profiles.active=prod
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:proddb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DRIVER_CLASS:org.postgresql.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.example.whatsappchatbot=INFO

